# update.yml — Frequent job: fetch RT, merge schedule, publish departures.json
#
# Runs every 5 minutes and deploys public/ to GitHub Pages.
#
# REFRESH RATE:
#   5 minutes is the FASTEST a GitHub Actions cron can run (documented minimum).
#   The ~10-builds/hour GitHub Pages limit does NOT apply here — that limit is
#   only for the default Jekyll build; custom Actions deploy workflows (this one,
#   via actions/deploy-pages) are exempt.  The sign shows accurate countdowns
#   regardless of file age because the firmware computes "minutes until departure"
#   from the absolute epoch times in the JSON — a slightly stale file is still correct.
#
# NOTE: GitHub's cron can be delayed a few minutes under load.  For guaranteed
#   sub-5-minute refresh, move this job to a host with 1-minute cron (e.g. Deno Deploy).
#
# SETUP:
#  1. Go to your repo Settings → Pages → Source → GitHub Actions.
#  2. Make sure stop_schedule.json exists (run the build-schedule workflow first).
#  3. Push this workflow — it auto-runs every 5 minutes.

name: Update Departures

on:
  schedule:
    # Every 5 minutes — the fastest GitHub Actions cron allows.
    - cron: "*/5 * * * *"
  # Also allow manual trigger from the Actions tab for testing.
  workflow_dispatch:

# Required to deploy to GitHub Pages.
permissions:
  pages: write
  id-token: write

# Only one deployment runs at a time.  cancel-in-progress: true means that if
# a new run starts while an older one is still deploying, the OLDER run is
# cancelled and the NEWER (fresher data) run takes over.  This is the correct
# behaviour for a continuous publish pipeline.
concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run update_departures.py
        # Paths (config.yaml, stop_schedule.json, public/) resolve relative to the script.
        # If the RT feed is down, the script still exits 0 with scheduled-only data.
        run: python update_departures.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Only the public/ subdirectory is published.
          path: public

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

# build-firmware.yml — OTA firmware binary build + manifest publish
#
# This workflow compiles the ESP32-C3 firmware with PlatformIO, computes its
# sha256, writes cloud/public_assets/firmware.json + firmware.bin, and commits
# them back to the repo.  The update.yml workflow then copies those files into
# public/ on every deploy run, serving them at:
#
#   /firmware.bin  — raw binary for OTA download
#   /firmware.json — manifest {version, bin_url, sha256}
#
# HOW TO CUT A FIRMWARE RELEASE:
#   1. Bump FW_VERSION in firmware/include/config.h (e.g. "1.4.0").
#   2. Commit and push a tag starting with "fw-" (e.g. "fw-1.4.0").
#      The push-tag trigger fires this workflow automatically.
#   3. Alternatively, trigger it manually from Actions → Build Firmware → Run workflow.
#   4. After the workflow succeeds, the next update.yml run will include the
#      firmware block in departures.json and devices will see the OTA update.
#
# PREREQUISITES:
#   - The firmware must compile cleanly with PlatformIO env "xteink-x4".
#   - firmware/include/config.h must contain:  #define FW_VERSION "x.y.z"
#   - This workflow is intentionally separate from the update cycle and is run
#     ONLY when cutting a firmware release.

name: Build Firmware

on:
  # Manual trigger — useful for testing without creating a tag.
  workflow_dispatch:
  # Automatic trigger when a firmware release tag is pushed.
  push:
    tags:
      - "fw-*"

permissions:
  contents: write   # needed to commit firmware.json + firmware.bin back to the repo

jobs:
  build-firmware:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware (env xteink-x4)
        # Compiles the firmware for the Xteink X4 board.
        # This step will fail if the firmware does not compile — do not suppress.
        run: pio run --environment xteink-x4
        working-directory: firmware

      - name: Locate firmware binary
        id: locate_bin
        # PlatformIO writes the binary to .pio/build/<env>/firmware.bin.
        run: |
          BIN=$(find firmware/.pio/build/xteink-x4 -name "firmware.bin" | head -1)
          if [ -z "$BIN" ]; then
            echo "ERROR: firmware.bin not found after pio run." >&2
            exit 1
          fi
          echo "bin_path=$BIN" >> "$GITHUB_OUTPUT"
          echo "Firmware binary: $BIN ($(du -h "$BIN" | cut -f1))"

      - name: Compute sha256
        id: sha256
        run: |
          SHA=$(sha256sum "${{ steps.locate_bin.outputs.bin_path }}" | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "sha256: $SHA"

      - name: Read FW_VERSION from firmware/include/config.h
        id: fw_version
        run: |
          VER=$(grep -oP '(?<=#define FW_VERSION ")([^"]+)' firmware/include/config.h)
          if [ -z "$VER" ]; then
            echo "ERROR: Could not parse FW_VERSION from firmware/include/config.h" >&2
            echo "Expected a line like:  #define FW_VERSION \"1.3.0\"" >&2
            exit 1
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "FW_VERSION: $VER"

      - name: Write firmware manifest (cloud/public_assets/firmware.json)
        run: |
          mkdir -p cloud/public_assets
          python3 - <<'PYEOF'
          import json, os
          data = {
              "version": os.environ["FW_VERSION"],
              "bin_url": "https://fazaaaaaaaaaa.github.io/qld-bus-sign/firmware.bin",
              "sha256":  os.environ["SHA256"],
          }
          with open("cloud/public_assets/firmware.json", "w") as f:
              json.dump(data, f, indent=2)
          print("Written cloud/public_assets/firmware.json:", data)
          PYEOF
        env:
          FW_VERSION: ${{ steps.fw_version.outputs.version }}
          SHA256: ${{ steps.sha256.outputs.sha256 }}

      - name: Copy firmware binary to cloud/public_assets/firmware.bin
        run: |
          mkdir -p cloud/public_assets
          cp "${{ steps.locate_bin.outputs.bin_path }}" cloud/public_assets/firmware.bin
          echo "Copied firmware.bin to cloud/public_assets/ ($(du -h cloud/public_assets/firmware.bin | cut -f1))"

      - name: Commit firmware manifest + binary back to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cloud/public_assets/firmware.json cloud/public_assets/firmware.bin
          # Only commit if there are actual changes.
          git diff --cached --quiet || git commit -m \
            "chore: publish firmware v${{ steps.fw_version.outputs.version }} OTA assets [skip ci]"
          git push

# ============================================================
# QLD Bus Departure Sign — Cloud Backend Configuration (v3)
# ============================================================
# This file is used by build_schedule.py and update_departures.py.
# Edit the values below, then:
#   1. Run build_schedule.py once to generate stop_schedule.json.
#   2. Commit everything and push — GitHub Actions handles the rest.
# ============================================================

# ---- Stops (multi-stop, Data Contract v3) ----------------------
# Each entry must have:
#   key       — stable identifier emitted in departures.json "stop_id" field.
#               Firmware selects the displayed stop by matching this value.
#   label     — human-readable display name (shown in the sign header).
#   match_ids — list of IDs to match against stops.txt.
#               build_schedule.py checks BOTH stop_id == id AND stop_code == id
#               for each entry, so you can list the numeric GTFS stop_id and/or
#               the public stop code and the resolver handles either form.
#   routes    — route_short_name filter; only services with these routes are
#               included for this stop. Leave empty to show all routes.
#
# How to find your stop IDs:
#   Option A: Go to https://jp.translink.com.au and search for your stop.
#             The stop_id appears in the URL or stop detail page.
#   Option B: Download the static GTFS zip (see gtfs_static_zip_url below),
#             open stops.txt, and search for your stop name.  stop_id is column 1,
#             stop_code is column 2.
#   Option C: Use the data.qld.gov.au GTFS SEQ dataset explorer.
stops:
  - key: "011180"
    label: "Bonney Ave at Victoria Parade, Stop 24, Clayfield"
    match_ids: ["011180", "11180"]   # matched against stop_id OR stop_code in stops.txt
    routes: ["320"]
  - key: "24"
    label: "Adelaide St, Stop 24 near Edward St"
    match_ids: ["24", "000024"]      # matched against stop_id OR stop_code in stops.txt
    routes: ["320", "322"]

# ---- Display --------------------------------------------------
# Maximum departure rows emitted per stop in departures.json.
max_rows: 6

# Timezone for all local-time calculations.
# Brisbane has no DST, so utc_offset_seconds is always 36000.
timezone: "Australia/Brisbane"

# ---- GTFS Feed URLs -------------------------------------------
# Static GTFS schedule ZIP (~28 MB).
# IMPORTANT: This URL sometimes changes. If it returns 404, check:
#   https://www.data.qld.gov.au/dataset/general-transit-feed-specification-gtfs-seq
# and copy the current download link for "GTFS - SEQ".
gtfs_static_zip_url: "https://gtfsrt.api.translink.com.au/GTFS/SEQ_GTFS.zip"

# Real-time TripUpdates protobuf (GTFS-RT v2.0, public, no API key required).
rt_trip_updates_url: "https://gtfsrt.api.translink.com.au/api/realtime/SEQ/TripUpdates"

# Real-time ServiceAlerts protobuf.
# Any failure (HTTP error, timeout, parse error) → alerts: [] in departures.json.
# On 404 the backend logs a warning and continues — departures are never blocked.
rt_service_alerts_url: "https://gtfsrt.api.translink.com.au/api/realtime/SEQ/ServiceAlerts"

# ---- OTA Firmware (optional) -----------------------------------
# If firmware_manifest_url is non-empty, update_departures.py fetches it and
# embeds {version, bin_url, sha256} as the "firmware" block in departures.json.
# Leave empty to omit the firmware block entirely (safe default).
# Alternatively, place cloud/public_assets/firmware.json on-disk (written by the
# build-firmware workflow) and it will be read as a fallback when this is empty.
firmware_manifest_url: ""

# ---- Timeouts -------------------------------------------------
# Timeout (seconds) for network requests to Translink feeds.
feed_timeout_seconds: 15

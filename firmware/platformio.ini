; =============================================================================
; QLD Bus Departure Sign — Xteink X4 Firmware (JSON/NTP edition)
; PlatformIO project configuration
;
; The Xteink X4 is a bare ESP32-C3 module in a pocket e-reader form factor.
; There is no dedicated PlatformIO board definition for it, so we use the
; generic esp32-c3-devkitm-1 target — pin numbers, flash size, and all
; hardware details are set in include/config.h.
; =============================================================================

[env:xteink-x4]
platform  = espressif32
board     = esp32-c3-devkitm-1   ; Generic C3 — the X4 is a bare ESP32-C3
framework = arduino

; ---- Serial monitor --------------------------------------------------------
monitor_speed = 115200

; ---- Flash size ------------------------------------------------------------
; The X4 has 16 MB flash. Override the default devkitm-1 board.json (4 MB).
board_build.flash_size        = 16MB
board_build.partitions        = default_16MB.csv
board_upload.flash_size       = 16MB

; ---- USB CDC (native USB on ESP32-C3) --------------------------------------
; The ESP32-C3's USB-Serial/JTAG peripheral is wired to the USB-C port.
; These flags make Arduino Serial appear on that native USB port without a
; separate UART adapter.
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

; ---- Library dependencies --------------------------------------------------
;
; GxEPD2_4G     — 4-level greyscale e-paper driver (zinggjm/GxEPD2_4G)
;                 Provides GxEPD2_4G_4G<PanelClass, PAGE_HEIGHT> template,
;                 GxEPD_BLACK/DARKGREY/LIGHTGREY/WHITE colour constants,
;                 AND the panel class GxEPD2_426_GDEQ0426T82 (in src/gdeq/).
;                 This library is SELF-CONTAINED — do NOT also add zinggjm/GxEPD2.
;                 The GxEPD2 base library uses a different base class (GxEPD2_EPD)
;                 that is INCOMPATIBLE with GxEPD2_4G_EPD; mixing them causes
;                 duplicate/conflicting symbol errors at link time.
;
; Adafruit GFX  — required transitive dep; provides FreeSans font headers
; Adafruit BusIO — required transitive dep of Adafruit GFX
; ArduinoJson   — v7.x JSON parsing (stream-based to minimise RAM usage)
;
; WiFiManager   — captive-portal Wi-Fi setup (tzapu/WiFiManager).
;                 Version ^2.0.17 targets the tzapu maintained branch.
;                 This version has known issues with arduino-esp32 v3.x / ESP-IDF 5
;                 (the WebServer API changed).  If you see a compile error such as
;                 "WebServer.h not found" or method mismatches, switch to the GitHub
;                 master snapshot which has the ESP-IDF 5 fix:
;                   https://github.com/tzapu/WiFiManager.git
;                 See README.md § "WiFiManager version" for details.
;
; WiFiClientSecure, HTTPClient, WebServer, DNSServer, configTime, Preferences,
; Update (OTA), and mbedTLS (SHA-256) are all part of the arduino-esp32 core
; (ESP-IDF 5 / mbedTLS 3) and do NOT need separate lib_deps entries.
; Preferences (ESP32 NVS) is used for QoL feature settings + JSON cache storage.
lib_deps =
    https://github.com/ZinggJM/GxEPD2_4G.git  ; 4-level greyscale driver (GxEPD2_4G_4G template) — git source (not in the PIO registry)
                                   ; IMPORTANT: GxEPD2_4G is self-contained — the panel class
                                   ; GxEPD2_426_GDEQ0426T82 lives in its own src/gdeq/ subfolder.
                                   ; Do NOT add zinggjm/GxEPD2 — that is a separate library with
                                   ; an incompatible base class (GxEPD2_EPD vs GxEPD2_4G_EPD) and
                                   ; would cause duplicate / conflicting symbol errors at link time.
    adafruit/Adafruit GFX Library  ; required by GxEPD2_4G (also provides FreeFonts)
    adafruit/Adafruit BusIO        ; required by Adafruit GFX
    bblanchon/ArduinoJson @ ^7.0   ; JSON parsing — v7 API (JsonDocument, not StaticJsonDocument)
    https://github.com/tzapu/WiFiManager.git  ; captive-portal Wi-Fi setup — git master (ESP-IDF 5 / arduino-esp32 v3 fix; see note above)

; ---- Upload settings -------------------------------------------------------
; Flash via esptool over the native USB CDC port.
; If autodetect fails, override upload_port with the actual /dev/cu.* path.
upload_speed = 921600
